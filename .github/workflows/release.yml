name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: extract
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.extract.outputs.version }}" >/dev/null 2>&1; then
            echo "Release v${{ steps.extract.outputs.version }} already exists, skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux ARM64 cross toolchain
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --bin codingbuddy --target ${{ matrix.target }}

      - name: Package artifact (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/codingbuddy dist/codingbuddy
          tar -C dist -czf dist/codingbuddy-${{ matrix.target }}.tar.gz codingbuddy
          rm dist/codingbuddy

      - name: Package artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target/${{ matrix.target }}/release/codingbuddy.exe dist/codingbuddy.exe
          Compress-Archive -Path dist/codingbuddy.exe -DestinationPath dist/codingbuddy-${{ matrix.target }}.zip -Force
          Remove-Item dist/codingbuddy.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codingbuddy-${{ matrix.target }}
          path: dist/codingbuddy-${{ matrix.target }}.${{ matrix.archive_ext }}

  publish:
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          find dist -mindepth 2 -type f -name 'codingbuddy-*' -exec cp {} dist/ \;

      - name: Generate checksums
        run: |
          cd dist
          shopt -s nullglob
          files=(codingbuddy-*.tar.gz codingbuddy-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no release artifacts found" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > checksums.txt

      - name: Create tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/codingbuddy-*.tar.gz
            dist/codingbuddy-*.zip
            dist/checksums.txt
